<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cafeteria - Fazer Pedido</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <a href="index.html" id="link-home">Home</a> |
        <a href="pagina_secundaria.html" id="link-Cardapio">Ver Cardápio</a>
    </nav>

    <h1>Novo Pedido</h1>

    <form id="form-pedido">
        <label>Nome do Cliente:</label>
        <input type="text" id="cliente" required><br><br>

        <label>Produto:</label>
        <input type="text" id="produto"><br><br>

        <label>Quantidade:</label>
        <input type="number" id="quantidade"><br><br>

        <button type="button" id="btn-enviar" onclick="processarPedido()">Enviar Pedido</button>
    </form>

    <p id="mensagem" style="font-weight: bold;"></p>

    <h2>Pedidos Cadastrados</h2>
    <table border="1" id="tabela-pedidos">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Produto</th>
                <th>Qtd</th>
            </tr>
        </thead>
        <tbody id="lista-pedidos">
        </tbody>
    </table>

    <script src="script.js"></script>
</body>

</html>
